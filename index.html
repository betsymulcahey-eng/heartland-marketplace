<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIP Outlet Deals | Shakopee, MN</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" href="logovip.png" type="image/png">
  <style>
    .product-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
    }
    .section-header {
      font-size: 2.25rem;
      line-height: 2.5rem;
      font-weight: 700;
      color: #111827;
    }
  </style>
</head>
<body class="bg-gray-50 font-sans">
  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="logovip.png" alt="VIP Outlet Deals" class="h-11 w-11 object-contain">
        <div>
          <span class="text-3xl font-bold tracking-tight text-gray-900">VIP Outlet Deals</span>
        </div>
      </div>
      
      <div class="flex items-center gap-4">
        <a href="#how-it-works" 
           class="px-5 py-2.5 text-sm font-medium text-gray-600 hover:text-gray-900 transition">
          How It Works
        </a>
      </div>
    </div>
  </header>

  <!-- Hero / How It Works -->
  <div id="how-it-works" class="max-w-4xl mx-auto px-6 pt-12 pb-8 text-center">
    <h1 class="text-5xl font-bold tracking-tight text-gray-900 mb-4">Quality Finds.<br>Local Pickup.</h1>
    <p class="text-xl text-gray-600 max-w-2xl mx-auto">
      Browse our current inventory below. When you're ready to buy, message us and we'll send an invoice. 
      Payment must be completed quickly — items are not held until paid.
    </p>
    <div class="mt-6 inline-flex items-center gap-2 text-sm text-gray-500">
      <i class="fas fa-map-marker-alt"></i>
      <span>Pickup at Heartland Outlet • 1698 Vierling Drive E, Shakopee, MN</span>
    </div>
  </div>

  <!-- Search + Filters -->
  <div class="max-w-7xl mx-auto px-6 pb-8">
    <div class="flex flex-col md:flex-row gap-4">
      <div class="flex-1 relative">
        <i class="fas fa-search absolute left-5 top-4 text-gray-400"></i>
        <input id="searchInput" 
               type="text" 
               placeholder="Search items..." 
               class="w-full pl-12 pr-5 py-4 bg-white border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-orange-500 text-lg">
      </div>
      <select id="categoryFilter" 
              class="px-6 py-4 bg-white border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-orange-500 text-lg min-w-[200px]">
        <option value="">All Categories</option>
      </select>
    </div>
  </div>

  <!-- Product Grid -->
  <div class="max-w-7xl mx-auto px-6 pb-16">
    <div id="productGrid" 
         class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <!-- Populated by JavaScript -->
    </div>
  </div>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQPXYpbeoPGUucM-ztzc19S0iUHZmfAiHR-BDq-Czmfc5FU2RRheHth7ChElIYqBcKwobhzSwwe1TGi/pub?output=csv&gid=953401573";

    async function loadInventory() {
      const response = await fetch(SHEET_URL);
      const text = await response.text();
      const rows = text.split('\n').map(row => row.split(',').map(cell => cell.replace(/^"|"$/g, '').trim()));
      
      const headers = rows[0];
      const data = rows.slice(1);
      
      const grid = document.getElementById('productGrid');
      grid.innerHTML = '';

      data.forEach(row => {
        const item = {};
        headers.forEach((h, i) => item[h] = row[i] || '');
        
        if (!item.SKU || (item.Status !== 'Live' && item.Status !== 'New')) return;

        const price = parseFloat(item['Regular Price'] || 0);
        
        const card = document.createElement('div');
        card.className = `product-card bg-white border border-gray-100 rounded-3xl overflow-hidden flex flex-col`;
        
        card.innerHTML = `
          <div class="h-56 bg-gray-100 flex items-center justify-center overflow-hidden">
            ${item['Image URL'] 
              ? `<img src="${item['Image URL']}" class="w-full h-full object-cover">` 
              : `<div class="text-gray-400 text-sm flex flex-col items-center"><i class="fas fa-image text-3xl mb-2"></i>No photo yet</div>`}
          </div>
          
          <div class="p-6 flex flex-col flex-1">
            <div class="flex-1">
              <span class="inline-block px-3 py-1 text-xs font-medium tracking-wider text-orange-600 bg-orange-50 rounded-full mb-3">
                ${item.Category || 'Other'}
              </span>
              <h3 class="font-semibold text-xl leading-tight mb-3 line-clamp-3">${item.Title}</h3>
            </div>

            <div class="mt-auto">
              <div class="flex items-baseline justify-between mb-5">
                <span class="text-4xl font-bold text-gray-900">$${price.toFixed(2)}</span>
              </div>
              
              <button onclick="interested('${item.SKU}', '${item.Title.replace(/'/g, "\\'")}')"
                      class="w-full bg-gray-900 hover:bg-black text-white font-semibold py-4 rounded-2xl transition flex items-center justify-center gap-2">
                <span>I'm Interested</span>
              </button>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function interested(sku, title) {
      const message = `Hi! I'm interested in:\n\n${title}\nSKU: ${sku}\n\nCan you please send me an invoice?`;
      alert(message + "\n\n(We'll connect this to Twilio/SendGrid soon so it actually sends a message.)");
    }

    // Load everything
    loadInventory();
  </script>
</body>
</html>
