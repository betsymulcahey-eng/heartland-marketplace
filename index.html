<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heartland Outlet Marketplace - Shakopee, MN</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-3xl font-bold text-emerald-700">Heartland Outlet</h1>
      <div class="flex gap-6">
        <a href="#contractors" class="text-emerald-600 hover:text-emerald-700 font-medium">Contractors</a>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8">
    <!-- Hero / How It Works -->
    <div class="bg-white rounded-2xl shadow p-8 mb-10">
      <h2 class="text-3xl font-bold mb-6">How It Works</h2>
      <p class="text-lg mb-8">Browse our inventory below. Message us with any questions. When you're ready to buy, we'll send an invoice. Payment must be completed quickly — items are not held until paid. Pickup at our Shakopee location.</p>
      <!-- Your standard text will go here too -->
    </div>

    <!-- Search and Filters -->
    <div class="flex flex-col md:flex-row gap-4 mb-8">
      <input id="searchInput" type="text" placeholder="Search items..." 
             class="flex-1 px-5 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500">
      <select id="categoryFilter" class="px-5 py-3 border rounded-xl focus:outline-none">
        <option value="">All Categories</option>
      </select>
    </div>

    <!-- Product Grid -->
    <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Items load here dynamically -->
    </div>
  </main>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQPXYpbeoPGUucM-ztzc19S0iUHZmfAiHR-BDq-Czmfc5FU2RRheHth7ChElIYqBcKwobhzSwwe1TGi/pub?output=csv&gid=953401573";
    
    async function loadInventory() {
      const response = await fetch(SHEET_URL);
      const text = await response.text();
      const rows = text.split('\n').map(row => row.split(',').map(cell => cell.replace(/^"|"$/g, '')));
      
      const headers = rows[0];
      const data = rows.slice(1);
      
      const grid = document.getElementById('productGrid');
      grid.innerHTML = '';
      
      data.forEach(row => {
        const item = {};
        headers.forEach((h, i) => item[h] = row[i] || '');
        
        if (item.Status !== 'Live' && item.Status !== 'New') return;
        
        const card = document.createElement('div');
        card.className = "bg-white rounded-2xl shadow hover:shadow-xl transition overflow-hidden";
        card.innerHTML = `
          <div class="h-56 bg-gray-200 flex items-center justify-center">
            ${item['Image URL'] ? `<img src="${item['Image URL']}" class="h-full w-full object-cover">` : '<span class="text-gray-400">No image</span>'}
          </div>
          <div class="p-6">
            <p class="text-sm text-emerald-600 font-medium">${item.Category || 'Other'}</p>
            <h3 class="font-semibold text-xl mt-2 mb-3 line-clamp-2">${item.Title}</h3>
            <p class="text-3xl font-bold text-emerald-700 mb-4">$${parseFloat(item['Regular Price'] || 0).toFixed(2)}</p>
            <button onclick="interested('${item.SKU}')" 
                    class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-4 rounded-xl">
              I'm Interested
            </button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function interested(sku) {
      alert(`Thanks! Message us on the site or text us about item ${sku}. We'll reply quickly.`);
      // Later: connect to Twilio / form
    }

    // Load on page start
    loadInventory();
  </script>
</body>
</html>
