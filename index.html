<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIP Outlet Deals | Shakopee, MN</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" href="logovip.png" type="image/png">
</head>
<body class="bg-gray-50 font-sans">
  <header class="bg-white border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <img src="logovip.png" alt="VIP Outlet Deals" class="h-16 object-contain">
        <span class="text-4xl font-bold tracking-tighter text-gray-900">VIP Outlet Deals</span>
      </div>
    </div>
  </header>

  <div class="max-w-4xl mx-auto px-6 py-12 text-center">
    <img src="logovip.png" alt="VIP Outlet Deals" class="mx-auto h-40 object-contain mb-8">
    <h1 class="text-5xl font-bold tracking-tight text-gray-900 mb-4">Quality Finds. Local Pickup.</h1>
  </div>

  <div class="bg-[#ffa125] text-white py-8">
    <div class="max-w-4xl mx-auto px-6 text-center">
      <p class="text-lg font-medium">Every purchase at VIP Outlet Deals is a win for you <strong>and</strong> helps fund the important work of <strong>Heart Response Ministry</strong>. Shop with a mission.</p>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex flex-col md:flex-row gap-4">
      <input id="searchInput" type="text" placeholder="Search items..." class="flex-1 px-6 py-4 border rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#ffa125]">
      <select id="categoryFilter" class="px-6 py-4 border rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#ffa125]">
        <option value="">All Categories</option>
      </select>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 pb-16">
    <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center">
    <div class="max-w-4xl w-full mx-4">
      <img id="lightboxImage" class="max-h-[80vh] mx-auto rounded-lg">
      <div class="text-center text-white mt-4">
        <button onclick="closeLightbox()" class="px-6 py-2 bg-white/20 hover:bg-white/30 rounded-full">Close</button>
      </div>
    </div>
  </div>

  <script>
    const JSON_URL = "https://script.google.com/macros/s/AKfycbzf7-6TQqzeW2QyI9VfdZ0ehrnus5rnZvu52gnx8Bg0v5U5RVWcL3bmpeSIJOQzGSmC/exec";

    async function loadInventory() {
      const grid = document.getElementById('productGrid');
      grid.innerHTML = '<p class="col-span-full text-center py-12 text-gray-500">Loading inventory...</p>';

      const response = await fetch(JSON_URL);
      const data = await response.json();

      grid.innerHTML = '';

      data.forEach(item => {
        const sku = (item.SKU || "").toString().trim();
        if (!sku || (item.Status !== 'Live' && item.Status !== 'New')) return;

        const price = parseFloat(item['Regular Price'] || 0);

        const card = document.createElement('div');
        card.className = "bg-white rounded-3xl shadow hover:shadow-xl overflow-hidden cursor-pointer";
        card.innerHTML = `
          <div class="h-64 bg-gray-100 flex items-center justify-center overflow-hidden">
            <img src="images/${sku}.png" 
                 onerror="this.src='https://via.placeholder.com/400x300/eeeeee/999999?text=No+Image+Yet'" 
                 class="w-full h-full object-contain bg-white">
          </div>
          <div class="p-6">
            <p class="text-xs font-medium text-[#ffa125] uppercase">${item.Category || 'Other'}</p>
            <h3 class="font-semibold text-lg mt-2 mb-3 line-clamp-3">${item.Title}</h3>
            <p class="text-3xl font-bold text-gray-900 mb-6">$${price.toFixed(2)}</p>
            <button onclick="event.stopImmediatePropagation(); interested('${sku}', '${item.Title}')" 
                    class="w-full bg-gray-900 hover:bg-black text-white py-4 rounded-2xl font-semibold">
              I'm Interested
            </button>
          </div>
        `;
        card.onclick = () => showLightbox(sku);
        grid.appendChild(card);
      });
    }

    function showLightbox(sku) {
      const lightbox = document.getElementById('lightbox');
      const img = document.getElementById('lightboxImage');
      img.src = `images/${sku}.png`;
      lightbox.classList.remove('hidden');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.add('hidden');
    }

    function interested(sku, title) {
      alert(`Interested in: ${title}\n\nWe'll send you an invoice for SKU ${sku}.`);
    }

    loadInventory();
  </script>
</body>
</html>
