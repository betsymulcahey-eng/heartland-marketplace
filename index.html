<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIP Outlet Deals | Shakopee, MN</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <div class="max-w-7xl mx-auto px-6 py-12">
    <div id="debug" class="mb-8 p-4 bg-yellow-100 rounded"></div>
    <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </div>

  <script>
    const JSON_URL = "https://script.google.com/macros/s/AKfycbzf7-6TQqzeW2QyI9VfdZ0ehrnus5rnZvu52gnx8Bg0v5U5RVWcL3bmpeSIJOQzGSmC/exec";

    async function loadInventory() {
      const debug = document.getElementById('debug');
      const grid = document.getElementById('productGrid');
      grid.innerHTML = '';

      const response = await fetch(JSON_URL);
      const data = await response.json();

      debug.innerHTML = `<strong>Debug:</strong> Trying to load images from <code>images/SKU.png</code>`;

      data.forEach(item => {
        const sku = (item.SKU || "").toString().trim();
        if (!sku) return;

        const price = parseFloat(item['Regular Price'] || 0);

        const card = document.createElement('div');
        card.className = "bg-white rounded-3xl shadow p-4";
        card.innerHTML = `
          <div class="h-56 bg-gray-100 flex items-center justify-center text-xs text-gray-500">
            Trying: images/${sku}.png
          </div>
          <h3 class="font-semibold mt-4">${item.Title}</h3>
          <p class="text-2xl font-bold">$${price.toFixed(2)}</p>
        `;
        grid.appendChild(card);
      });
    }

    loadInventory();
  </script>
</body>
</html>
