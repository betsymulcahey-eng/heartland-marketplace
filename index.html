<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIP Outlet Deals | Shakopee, MN</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <link rel="icon" href="logovip.png" type="image/png">
</head>
<body class="bg-gray-50 font-sans">
  <header class="bg-white border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <img src="logovip.png" alt="VIP Outlet Deals" class="h-16 object-contain">
        <span class="text-4xl font-bold tracking-tighter text-gray-900">VIP Outlet Deals</span>
      </div>
    </div>
  </header>

  <div class="max-w-4xl mx-auto px-6 py-12 text-center">
    <img src="logovip.png" alt="VIP Outlet Deals" class="mx-auto h-40 object-contain mb-8">
    <h1 class="text-5xl font-bold tracking-tight text-gray-900 mb-4">Quality Finds. Local Pickup.</h1>
  </div>

  <div class="bg-[#ffa125] text-white py-8">
    <div class="max-w-4xl mx-auto px-6 text-center">
      <p class="text-lg font-medium">Every purchase at VIP Outlet Deals is a win for you <strong>and</strong> helps fund the important work of <strong>Heart Response Ministry</strong>. Shop with a mission.</p>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex flex-col md:flex-row gap-4">
      <input id="searchInput" type="text" placeholder="Search items..." class="flex-1 px-6 py-4 border rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#ffa125]">
      <select id="categoryFilter" class="px-6 py-4 border rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#ffa125]">
        <option value="">All Categories</option>
      </select>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 pb-16">
    <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
  </div>

  <!-- I'm Interested Popup -->
  <div id="interestModal" class="hidden fixed inset-0 bg-black/70 z-[100] flex items-center justify-center">
    <div class="bg-white rounded-3xl p-8 max-w-md w-full mx-4">
      <h3 class="text-2xl font-bold mb-2">I'm Interested</h3>
      <p id="modalItemTitle" class="text-gray-600 mb-6"></p>
      
      <input id="customerName" type="text" placeholder="Your Name" class="w-full mb-4 px-4 py-3 border rounded-2xl">
      <input id="customerPhone" type="tel" placeholder="Phone Number" class="w-full mb-6 px-4 py-3 border rounded-2xl">
      
      <div class="flex gap-3">
        <button onclick="closeModal()" class="flex-1 py-4 border rounded-2xl font-medium">Cancel</button>
        <button onclick="submitInterest()" class="flex-1 py-4 bg-gray-900 text-white rounded-2xl font-semibold">Send Request</button>
      </div>
    </div>
  </div>

  <script>
    emailjs.init("QLVByNfZS7_OqeChN");

    const JSON_URL = "https://script.google.com/macros/s/AKfycbzf7-6TQqzeW2QyI9VfdZ0ehrnus5rnZvu52gnx8Bg0v5U5RVWcL3bmpeSIJOQzGSmC/exec";
    let currentItem = {};

    async function loadInventory() {
      const grid = document.getElementById('productGrid');
      grid.innerHTML = '<p class="col-span-full text-center py-12 text-gray-500">Loading inventory...</p>';

      try {
        const response = await fetch(JSON_URL);
        const data = await response.json();

        grid.innerHTML = '';

        data.forEach(item => {
          const sku = (item.SKU || "").toString().trim();
          if (!sku || (item.Status !== 'Live' && item.Status !== 'New')) return;

          const price = parseFloat(item['Regular Price'] || 0);

          const card = document.createElement('div');
          card.className = "bg-white rounded-3xl shadow hover:shadow-xl overflow-hidden cursor-pointer";
          card.innerHTML = `
            <div class="h-64 bg-gray-100 flex items-center justify-center overflow-hidden">
              <img src="images/${sku}.png" onerror="this.src='https://via.placeholder.com/400x300/eeeeee/999999?text=No+Image+Yet'" class="w-full h-full object-contain">
            </div>
            <div class="p-6">
              <p class="text-xs font-medium text-[#ffa125] uppercase">${item.Category || 'Other'}</p>
              <h3 class="font-semibold text-lg mt-2 mb-3 line-clamp-3">${item.Title}</h3>
              <p class="text-3xl font-bold text-gray-900 mb-6">$${price.toFixed(2)}</p>
              <button onclick="event.stopImmediatePropagation(); openInterestModal('${sku}', '${item.Title}', ${price})" 
                      class="w-full bg-gray-900 hover:bg-black text-white py-4 rounded-2xl font-semibold">
                I'm Interested
              </button>
            </div>
          `;
          grid.appendChild(card);
        });
      } catch (e) {
        grid.innerHTML = '<p class="col-span-full text-center py-12 text-red-500">Error loading data. Please refresh.</p>';
      }
    }

    function openInterestModal(sku, title, price) {
      currentItem = {sku, title, price};
      document.getElementById('modalItemTitle').textContent = title;
      document.getElementById('interestModal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('interestModal').classList.add('hidden');
    }

    function submitInterest() {
      const name = document.getElementById('customerName').value.trim();
      const phone = document.getElementById('customerPhone').value.trim();

      if (!name || !phone) {
        alert("Please enter your name and phone number.");
        return;
      }

      emailjs.send("service_hcctwtc", "template_28nbhy2", {
        item_title: currentItem.title,
        sku: currentItem.sku,
        price: currentItem.price.toFixed(2),
        customer_name: name,
        customer_phone: phone,
        date: new Date().toLocaleString()
      }).then(() => {
        alert("Request sent! We'll contact you shortly.");
        closeModal();
      }).catch(() => {
        alert("There was an error. Please try again.");
      });
    }

    loadInventory();
  </script>
</body>
</html>
