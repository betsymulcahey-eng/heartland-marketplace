<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIP Outlet Deals - Shakopee, MN</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" href="logovip.png" type="image/png">
</head>
<body class="bg-gray-50 font-sans">
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <img src="logovip.png" alt="VIP Outlet Deals" class="h-12">
        <h1 class="text-3xl font-bold text-emerald-700">VIP Outlet Deals</h1>
      </div>
      <a href="#contractors" class="text-emerald-600 hover:text-emerald-700 font-medium flex items-center gap-2">
        <i class="fas fa-users"></i> Contractors
      </a>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8">
    <!-- How It Works -->
    <div class="bg-white rounded-3xl shadow p-8 mb-10 text-center">
      <h2 class="text-3xl font-bold mb-6">How It Works</h2>
      <p class="text-lg max-w-2xl mx-auto">
        Browse our inventory below. Message us with any questions. When you're ready to buy, we'll send an invoice. 
        Payment must be completed quickly — items are not held until paid. Pickup at Heartland Outlet in Shakopee.
      </p>
    </div>

    <!-- Search and Filters -->
    <div class="flex flex-col md:flex-row gap-4 mb-8">
      <input id="searchInput" 
             type="text" 
             placeholder="Search items..." 
             class="flex-1 px-6 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-lg">
      <select id="categoryFilter" 
              class="px-6 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-lg">
        <option value="">All Categories</option>
      </select>
    </div>

    <!-- Product Grid -->
    <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <!-- Populated by JavaScript -->
    </div>
  </main>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQPXYpbeoPGUucM-ztzc19S0iUHZmfAiHR-BDq-Czmfc5FU2RRheHth7ChElIYqBcKwobhzSwwe1TGi/pub?output=csv&gid=953401573";
    
    async function loadInventory() {
      try {
        const response = await fetch(SHEET_URL);
        const text = await response.text();
        const rows = text.split('\n').map(row => row.split(',').map(cell => cell.replace(/^"|"$/g, '').trim()));
        
        const headers = rows[0];
        const data = rows.slice(1);
        
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';

        data.forEach(row => {
          const item = {};
          headers.forEach((h, i) => item[h] = row[i] || '');
          
          if (!item.SKU || (item.Status !== 'Live' && item.Status !== 'New')) return;

          const card = document.createElement('div');
          card.className = "bg-white rounded-3xl shadow hover:shadow-2xl transition-all duration-300 overflow-hidden group";
          card.innerHTML = `
            <div class="h-64 bg-gray-100 flex items-center justify-center relative">
              ${item['Image URL'] ? 
                `<img src="${item['Image URL']}" class="h-full w-full object-cover group-hover:scale-105 transition-transform">` : 
                '<div class="text-gray-400 text-sm">No photo yet</div>'}
            </div>
            <div class="p-6">
              <p class="text-xs uppercase tracking-widest text-emerald-600 font-medium">${item.Category || 'Other'}</p>
              <h3 class="font-semibold text-xl mt-2 mb-3 line-clamp-3">${item.Title}</h3>
              <p class="text-3xl font-bold text-emerald-700 mb-6">$${parseFloat(item['Regular Price'] || 0).toFixed(2)}</p>
              
              <button onclick="interested('${item.SKU}', '${item.Title}')" 
                      class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 rounded-2xl transition">
                I'm Interested
              </button>
            </div>
          `;
          grid.appendChild(card);
        });
      } catch (e) {
        console.error(e);
      }
    }

    function interested(sku, title) {
      alert(`Thanks for your interest in ${title}!\n\nMessage us with SKU ${sku} and we'll send you an invoice quickly.`);
    }

    // Load the inventory
    loadInventory();
  </script>
</body>
</html>
